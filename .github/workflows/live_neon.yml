name: live-neon

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC-only and does not understand PST/PDT.
    # We run hourly and let the script gate on Pacific local time (DST-proof).
    - cron: "0 * * * *"

jobs:
  live-neon:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ODDS_API_KEY_FREE: ${{ secrets.ODDS_API_KEY_FREE }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live Neon ingestion
        run: |
          # --force is intentionally NOT used here; schedule runs are gated in-script.
          python scripts/live_neon_sink.py --days-back-game-logs 2

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-neon-logs
          path: logs/
          if-no-files-found: ignore

